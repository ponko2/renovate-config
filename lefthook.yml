commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
pre-commit:
  parallel: true
  jobs:
    - name: EditorConfig
      run: editorconfig-checker {staged_files}
    - name: Nix
      group:
        parallel: false
        jobs:
          - name: deadnix
            run: deadnix --edit {staged_files}
            glob: "*.nix"
            stage_fixed: true
          - name: statix
            run: statix fix
            glob: "*.nix"
            stage_fixed: true
          - name: Nixfmt
            run: nixfmt {staged_files}
            glob: "*.nix"
            stage_fixed: true
    - name: Oxfmt
      run: oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - name: Renovate Config Validator
      run: pnpm exec renovate-config-validator --strict {staged_files}
      glob: default.json
    - name: yamllint
      run: yamllint --list-files --strict {staged_files}
      glob: "*.{yaml,yml}"
